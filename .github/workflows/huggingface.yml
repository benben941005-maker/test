name: Deploy to Hugging Face
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf \
            https://USER:$HF_TOKEN@huggingface.co/spaces/
            ${{ secrets.HF_USERNAME }}/${{ secrets.HF_SPACE_NAME }}
          git push hf main --force
